!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Góp ý nâng cao</title> <!--Thẻ tiêu đề-->
</head>
<body>
<h1>Góp ý nâng cao</h1>
<form >
  <div>
    <label for="name">Vui lòng nhập tên của bạn: </label><br>
    <input type="text" id="name" name="name" required><br><br>
  </div>
  <div>
    <label for="email">Vui lòng nhập email của bạn: </label><br>
    <input type="email" id="email" name="email" required><br><br>
  </div>
  <div>
    <label for="topic">Chủ đề góp ý: </label><br>
    <select id="topic">
      <option value="website">Góp ý về trang web</option>
      <option value="content">Góp ý về nội dung</option>
      <option value="design">Góp ý về thiết kế</option>
      <option value="other">Khác</option>
    </select>
    <br><br>
  </div>
  <div>
    <label for="content">Vui lòng nhập góp ý của bạn: </label><br>
    <textarea id="content" name="content" rows="10" cols="50"
              placeholder="Nhập góp ý của bạn ở đây..."></textarea><br><br>
  </div>
  <div>
    <label for="rating">Đánh giá mức độ hài lòng của bạn về trang web: </label><br>
    <input type="radio" id="rating1" name="rating" value="1">
    <label for="rating1">1 - Rất không hài lòng</label><br>
    <input type="radio" id="rating1" name="rating" value="1">
    <label for="rating1">2 - Trải nghiệm tệ</label><br>
    <input type="radio" id="rating1" name="rating" value="1">
    <label for="rating1">3 - Bình thường</label><br>
    <input type="radio" id="rating1" name="rating" value="1">
    <label for="rating1">4 - Tạm ổn</label><br>
    <input type="radio" id="rating1" name="rating" value="1">
    <label for="rating1">5 - Trải nghiệm tố<td></td></label><br>
  </div>

  <div>
    <br><input type="submit" value="Gửi góp ý">
  </div>

</form>
</html>
